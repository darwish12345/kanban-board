<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid p-0">
        <!-- Header -->
        <nav class="navbar navbar-dark bg-gradient-primary">
            <div class="container-fluid">
                <span class="navbar-brand">
                    <i class="fas fa-tasks me-2"></i>
                    Kanban Board Pro
                </span>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-light" id="exportBoardBtn">
                        <i class="fas fa-download me-1"></i> Export
                    </button>
                    <button class="btn btn-outline-light" id="importBoardBtn">
                        <i class="fas fa-upload me-1"></i> Import
                    </button>
                    <button class="btn btn-light" id="addColumnBtn">
                        <i class="fas fa-plus me-1"></i> Add Column
                    </button>
                </div>
            </div>
        </nav>

        <!-- Board Container -->
        <div class="board-container" id="boardContainer">
            <div class="board-header">
                <h2><i class="fas fa-chalkboard me-2"></i>Project Dashboard</h2>
                <div class="board-actions">
                    <button class="btn btn-sm btn-info" id="resetBoardBtn">
                        <i class="fas fa-sync-alt me-1"></i> Reset Demo Board
                    </button>
                </div>
            </div>
            <div class="board-columns" id="boardColumns">
                <!-- Columns will be dynamically added here -->
            </div>
        </div>

        <!-- Add Task Modal -->
        <div class="modal fade" id="addTaskModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>Add New Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addTaskForm">
                            <input type="hidden" id="taskColumnId">
                            <div class="mb-3">
                                <label class="form-label">Task Title *</label>
                                <input type="text" class="form-control" id="taskTitle" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="taskDesc" rows="3"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Priority</label>
                                    <select class="form-select" id="taskPriority">
                                        <option value="low">🟢 Low</option>
                                        <option value="medium" selected>🟡 Medium</option>
                                        <option value="high">🔴 High</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Due Date</label>
                                    <input type="date" class="form-control" id="taskDueDate">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Labels</label>
                                <div class="label-selector">
                                    <span class="label-badge" data-label="bug">🐛 Bug</span>
                                    <span class="label-badge" data-label="feature">✨ Feature</span>
                                    <span class="label-badge" data-label="enhancement">🚀 Enhancement</span>
                                    <span class="label-badge" data-label="documentation">📚 Docs</span>
                                    <span class="label-badge" data-label="design">🎨 Design</span>
                                </div>
                                <div id="selectedLabels" class="mt-2"></div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="saveTaskBtn">Add Task</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Task Modal -->
        <div class="modal fade" id="editTaskModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Edit Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editTaskForm">
                            <input type="hidden" id="editTaskId">
                            <input type="hidden" id="editColumnId">
                            <div class="mb-3">
                                <label class="form-label">Task Title</label>
                                <input type="text" class="form-control" id="editTaskTitle" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="editTaskDesc" rows="3"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Priority</label>
                                    <select class="form-select" id="editTaskPriority">
                                        <option value="low">🟢 Low</option>
                                        <option value="medium">🟡 Medium</option>
                                        <option value="high">🔴 High</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Due Date</label>
                                    <input type="date" class="form-control" id="editTaskDueDate">
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" id="deleteTaskBtn">Delete</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="updateTaskBtn">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Column Modal -->
        <div class="modal fade" id="addColumnModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-columns me-2"></i>Add New Column</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Column Title</label>
                            <input type="text" class="form-control" id="newColumnTitle" placeholder="e.g., In Progress, Review, Done">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Column Color</label>
                            <select class="form-select" id="newColumnColor">
                                <option value="#667eea">Blue</option>
                                <option value="#10b981">Green</option>
                                <option value="#f59e0b">Orange</option>
                                <option value="#ef4444">Red</option>
                                <option value="#8b5cf6">Purple</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="createColumnBtn">Create Column</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden template for task card -->
    <div id="taskCardTemplate" style="display: none;">
        <div class="task-card" draggable="true">
            <div class="task-header">
                <div class="task-title"></div>
                <div class="task-actions">
                    <i class="fas fa-edit edit-task"></i>
                    <i class="fas fa-trash-alt delete-task"></i>
                </div>
            </div>
            <div class="task-description"></div>
            <div class="task-footer">
                <div class="task-priority"></div>
                <div class="task-due-date"></div>
            </div>
            <div class="task-labels"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
